services:
  api:
    build: .
    container_name: dean_office_api
    ports:
      - "3010:3010"
    volumes:
      - .:/app_code
      - db_data:/app_code/data
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=my-dev-secret-key-32-chars-long!!
      - ENCRYPTION_KEY=kK2VzrRbgo1mNoXJGjz-g19oeWsSLusnDQn3AaaMpvI=
    restart: unless-stopped

volumes:
  db_data: