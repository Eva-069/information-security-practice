services:
  api:
    build: .
    container_name: dean_office_api
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dean_nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data: